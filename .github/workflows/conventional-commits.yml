name: Conventional Commit Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        id: check
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -Pq "^(feat|fix|docs|style|refactor|test|chore): .+"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close PR if invalid
        if: steps.check.outputs.valid == 'false'
        run: |
          gh pr close ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --comment "Closed: PR title must follow Conventional Commits (e.g. feat: add feature)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send failure email
        if: steps.check.outputs.valid == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.ethereal.email
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "PR #${{ github.event.pull_request.number }} closed - bad title"
          body: "PR \"${{ github.event.pull_request.title }}\" was closed because it doesn't follow Conventional Commits."
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}

      - name: Fail
        if: steps.check.outputs.valid == 'false'
        run: exit 1
